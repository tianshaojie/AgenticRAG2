services:

  # ── PostgreSQL 15 + pgvector ──────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentic_rag
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Backend: FastAPI ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/agentic_rag
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_FORMAT: console
      EMBEDDING_PROVIDER: deterministic_stub
      ANSWER_PROVIDER: echo_stub
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Migration runner (runs once then exits) ───────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_migrate
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/agentic_rag
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Frontend: Vue 3 + Nginx ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
    name: agentic_rag_pg_data
